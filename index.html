<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Amisiyuuu🎁💜</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
  
  /* 🌸 FONDO VINO + LILA */
  body{
    background: linear-gradient(135deg, #3a0d1a 0%, #6b2a38 40%, #b57edc 100%);
    height:100vh;width:100vw;overflow:hidden;
    display:flex;justify-content:center;align-items:center;
    position:relative;
  }

  /* 🖼️ CAPA DE STICKERS EN MOVIMIENTO (fondo inicial) */
  .sticker-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .sticker {
    position: absolute;
    width: 80px;       /* Tamaño base, puedes ajustar */
    height: auto;
    opacity: 0.85;
    filter: drop-shadow(0 0 6px rgba(255,255,240,0.5));
    transition: transform 0.3s ease;
    will-change: left, top;
  }

  #contenido{
    text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:60px;
    margin-bottom: 20%;
    position: relative;
    z-index: 20;
  }
  
  #si {
    position: relative;
    left: 39px;
    box-shadow: 0 0 20px rgba(180, 100, 220, 0.6), 0 0 40px rgba(114, 47, 55, 0.5);
    transition: box-shadow 0.4s ease;
  }
  #si:hover {
    box-shadow: 0 0 30px rgba(200, 120, 240, 0.9), 0 0 60px rgba(130, 60, 70, 0.8);
  }

  h1{
    color:#fff;
    font-size:clamp(46px,8vw,90px);
    text-shadow:0 0 14px rgba(255,220,240,0.9);
    margin:0;
    text-align:center;
    transition:opacity .6s ease, transform .6s ease;
  }

  .botones{
    display:flex;justify-content:center;align-items:center;gap:80px;position:relative;z-index:30;
  }

  .btn{
    padding:18px 48px;border:none;border-radius:50px;min-width:170px;
    background: #6b2a38;
    color:#fff;font-size:clamp(20px,3vw,26px);
    box-shadow:0 8px 25px rgba(0,0,0,.18);cursor:pointer;
    transition:transform .2s ease, background .2s ease;
  }
  .btn:hover{
    transform:translateY(-3px);
    background: #4e1e28;
  }

  #mensaje{
    display:none;
    color:#fff;
    font-size:clamp(54px,9vw,115px);
    font-weight:600;
    text-shadow:0 0 28px rgba(255,220,240,0.9);
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%, -50%) scale(0.9);
    opacity:0;
    text-align:center;
    line-height:1.3;
    letter-spacing:1px;
    animation:mensajeZoom 1s ease forwards;
    transition:transform 1s ease;
    z-index: 100;
  }
  @keyframes mensajeZoom{
    0%{opacity:0; transform:translate(-50%, -50%) scale(0.9);}
    100%{opacity:1; transform:translate(-50%, -50%) scale(1);}
  }

  .latido{animation:latir 2s ease-in-out infinite;}
  @keyframes latir{
    0%,100%{transform:translate(-50%, -50%) scale(1);}
    50%{transform:translate(-50%, -50%) scale(1.05);}
  }

  #regalo{
    display:none;
    position:fixed;
    top:90%;left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    background:#6b2a38;
    color:#fff;
    border:none;
    border-radius:30px;
    padding:22px 55px;
    font-size:clamp(22px,3.5vw,28px);
    cursor:pointer;
    opacity:0;
    text-align:center;
    animation:aparecer 1s ease forwards;
    transition:all .3s ease;
    overflow:hidden;
    font-size: 40px;
    width: 80%;
    z-index: 100;
  }

  @keyframes aparecer{
    0%{opacity:0; transform:translate(-50%, -50%) scale(0.8);}
    100%{opacity:1; transform:translate(-50%, -50%) scale(1);}
  }

  .brillo::before{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:55px;
    background:linear-gradient(120deg,#fff,#b57edc,#ffe6f0,#b57edc,#fff);
    background-size:400%;
    z-index:-1;
    filter:blur(6px);
    animation:animarBorde 3s linear infinite;
  }

  @keyframes animarBorde{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  #regalo:hover{
    background:#4e1e28;
    transform:translate(-50%,-50%) scale(1.05);
  }

  .corazon{
    position:fixed;color:#fff;animation:flotar 5s ease-in infinite;
    pointer-events:none;z-index:0;
  }
  @keyframes flotar{
    0%{transform:translateY(0) scale(1);opacity:1}
    100%{transform:translateY(-80vh) scale(1.8);opacity:0}
  }

  .sube{transform:translate(-50%, calc(-56%)) scale(1);}

  #galaxia {display:none;position:fixed;inset:0;background:#000;z-index:9999;}
  canvas { 
    display:block; 
    position:absolute; 
    inset:0; 
    z-index:1; 
  }

  /* 🎵 Reproductor con dos botones grandes */
  .music-player{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap: 25px;
    background:rgba(0,0,0,0.5);
    padding: 18px 30px;
    border-radius: 60px;
    backdrop-filter: blur(8px);
    border: 2px solid rgba(180,126,220,0.6);
    box-shadow:0 0 30px rgba(180,100,220,0.5);
    z-index:999999;
  }

  .music-btn{
    background: #6b2a38;
    border: none;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow:0 0 15px rgba(180,100,220,0.7);
    transition: all 0.2s ease;
    letter-spacing: 2px;
  }

  .music-btn:hover{
    background: #b57edc;
    transform: scale(1.05);
    box-shadow:0 0 25px #d9b0ff;
  }

  .music-btn.playing{
    background: #b57edc;
    box-shadow:0 0 20px #ffffff;
  }

</style>

<body>

  <!-- STICKERS EN MOVIMIENTO (fondo inicial) -->
  <div class="sticker-layer" id="stickerLayer"></div>

  <div id="contenido">
    <h1 id="titulo">¿Quieres ser mi CHIKIBBY? 💖</h1>
    <div class="botones">
      <button id="si" class="btn" aria-label="Aceptar">Sí 💘</button>

  <div id="mensaje">¡JAJAJAAJ MUY BIEEEEEEN!💞</div>
  <button id="regalo" aria-label="Abrir regalo">🎁 Abre el regalo</button>

  <!-- 🌌 Galaxia -->
  <div id="galaxia">
    <canvas id="c"></canvas>
    
    <!-- Reproductor con dos botones (Music 1 / Music 2) -->
    <div class="music-player">
      <button class="music-btn" id="music1Btn">🎵 Music 1</button>
      <button class="music-btn" id="music2Btn">🎶 Music 2</button>
    </div>

    <!-- Dos elementos de audio -->
    <audio id="audio1" loop>
      <source src="cancion1.mp3" type="audio/mpeg">
    </audio>
    <audio id="audio2" loop>
      <source src="cancion2.mp3" type="audio/mpeg">
    </audio>
  </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js"></script>
<script>
// ================== STICKERS ANIMADOS EN FONDO INICIAL ==================
const stickerLayer = document.getElementById('stickerLayer');

// LISTA DE TUS IMÁGENES (cámbialas por tus archivos)
const imagenesStickers = [
  'sticker1.png',  // Reemplaza con tus nombres reales
  'sticker2.png',
  'sticker3.png',
  'sticker4.png',
  'sticker5.png'
];

// Configuración de movimiento
const stickers = [];
const numStickers = 12; // cantidad de stickers en pantalla

function crearSticker(src) {
  const img = document.createElement('img');
  img.src = src;
  img.className = 'sticker';
  img.style.width = (70 + Math.random() * 50) + 'px'; // tamaño variable
  img.style.opacity = 0.7 + Math.random() * 0.3;
  return img;
}

// Generar stickers
for (let i = 0; i < numStickers; i++) {
  const src = imagenesStickers[i % imagenesStickers.length];
  const sticker = crearSticker(src);
  stickerLayer.appendChild(sticker);
  
  // Posición inicial aleatoria (evitando centro superior donde está título y botones)
  let x, y;
  const w = window.innerWidth, h = window.innerHeight;
  do {
    x = 20 + Math.random() * (w - 120);
    y = 20 + Math.random() * (h - 120);
  } while (x > w*0.3 && x < w*0.7 && y > h*0.1 && y < h*0.5); // evitar zona central superior
  
  sticker.style.left = x + 'px';
  sticker.style.top = y + 'px';
  
  // Velocidad aleatoria para movimiento
  const speedX = (0.15 + Math.random() * 0.4) * (Math.random() > 0.5 ? 1 : -1);
  const speedY = (0.15 + Math.random() * 0.4) * (Math.random() > 0.5 ? 1 : -1);
  
  stickers.push({
    el: sticker,
    x, y,
    vx: speedX,
    vy: speedY,
    width: 80,  // se actualizará
    height: 80
  });
}

// Animar stickers (rebotando suavemente en bordes, evitando zona central)
function animarStickers() {
  const w = window.innerWidth, h = window.innerHeight;
  
  stickers.forEach(s => {
    const rect = s.el.getBoundingClientRect();
    s.width = rect.width;
    s.height = rect.height;
    
    // Mover
    s.x += s.vx;
    s.y += s.vy;
    
    // Rebote suave en bordes (solo invierte dirección)
    if (s.x <= 0) { s.x = 0; s.vx = Math.abs(s.vx); }
    if (s.x + s.width >= w) { s.x = w - s.width; s.vx = -Math.abs(s.vx); }
    if (s.y <= 0) { s.y = 0; s.vy = Math.abs(s.vy); }
    if (s.y + s.height >= h) { s.y = h - s.height; s.vy = -Math.abs(s.vy); }
    
    // Evitar zona central sin saltos bruscos
    const zonaX = w*0.25, zonaX2 = w*0.75;
    const zonaY = h*0.1, zonaY2 = h*0.55;
    
    const stickerCenterX = s.x + s.width/2;
    const stickerCenterY = s.y + s.height/2;
    
    if (stickerCenterX > zonaX && stickerCenterX < zonaX2 && 
        stickerCenterY > zonaY && stickerCenterY < zonaY2) {
      
      // Calcular la distancia más corta para salir
      const distToLeft = stickerCenterX - zonaX;
      const distToRight = zonaX2 - stickerCenterX;
      const distToTop = stickerCenterY - zonaY;
      const distToBottom = zonaY2 - stickerCenterY;
      const minDist = Math.min(distToLeft, distToRight, distToTop, distToBottom);
      
      // Empujar en la dirección más cercana sin cambiar posición abruptamente
      if (minDist === distToLeft) s.vx = -Math.abs(s.vx);
      else if (minDist === distToRight) s.vx = Math.abs(s.vx);
      else if (minDist === distToTop) s.vy = -Math.abs(s.vy);
      else s.vy = Math.abs(s.vy);
      
      // Pequeño empuje adicional para salir más rápido (opcional)
      s.x += s.vx * 0.3;
      s.y += s.vy * 0.3;
    }
    
    s.el.style.left = s.x + 'px';
    s.el.style.top = s.y + 'px';
  });
  
  requestAnimationFrame(animarStickers);
}
animarStickers();

// Redimensionar ventana: ajustar posiciones si es necesario
window.addEventListener('resize', () => {
  stickers.forEach(s => {
    s.x = Math.min(s.x, window.innerWidth - s.width);
    s.y = Math.min(s.y, window.innerHeight - s.height);
    s.el.style.left = s.x + 'px';
    s.el.style.top = s.y + 'px';
  });
});

// ================== LÓGICA PRINCIPAL (Sí / No / Regalo) ==================
const siBtn=document.getElementById('si');
const noBtn=document.getElementById('no');
const titulo=document.getElementById('titulo');
const msg=document.getElementById('mensaje');
const botones=document.querySelector('.botones');
const regalo=document.getElementById('regalo');
const galaxia=document.getElementById('galaxia');

let siRect,tituloRect;

document.addEventListener('DOMContentLoaded',()=>{
  siRect = siBtn.getBoundingClientRect();
  tituloRect = titulo.getBoundingClientRect();
  siBtn.style.position = 'fixed';
  siBtn.style.left = siRect.left + 'px';
  siBtn.style.top = (siRect.top + 40) + 'px';   // ← Bajado 40px
  siBtn.style.zIndex = 20;
  noBtn.style.position = 'fixed';
  noBtn.style.left = (siRect.right + 5) + 'px';
  noBtn.style.top = (siRect.top + 40) + 'px';   // ← Bajado 40px
});

function moverNo(){
  const bw=noBtn.offsetWidth,bh=noBtn.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  let x,y;
  do{
    x=Math.random()*(vw-bw-40)+20;
    y=Math.random()*(vh-bh-40)+20;
  }while(y<120);
  noBtn.style.transition="left .8s ease, top .8s ease";
  noBtn.style.left=`${x}px`;
  noBtn.style.top =`${y}px`;
}

noBtn.addEventListener('mouseenter',moverNo);
noBtn.addEventListener('touchstart',moverNo);

siBtn.addEventListener('click',()=>{
  titulo.style.opacity='0';
  titulo.style.transform='translateY(-20px)';
  botones.style.display='none';
  msg.style.display='block';
  setTimeout(()=>{msg.style.opacity='1';msg.classList.add('latido');},50);
  lanzarCorazones();
  // Ocultar stickers gradualmente (opcional)
  document.querySelector('.sticker-layer').style.opacity = '0';
  setTimeout(()=>{
    msg.classList.add('sube');
    regalo.style.display='block';
    regalo.classList.add('brillo');
  },2000);
});

regalo.addEventListener('click',()=>{
  regalo.classList.remove('brillo');
  document.body.style.background='#000';
  document.getElementById('contenido').style.display='none';
  msg.style.display='none';
  regalo.style.display='none';
  galaxia.style.display='block';
  iniciarGalaxia();
});

function lanzarCorazones(){
  for(let i=0;i<25;i++){
    const c=document.createElement('div');
    c.className='corazon';
    c.textContent='💖';
    c.style.left=Math.random()*window.innerWidth+'px';
    c.style.top=window.innerHeight+'px';
    c.style.fontSize=(18+Math.random()*26)+'px';
    c.style.animationDuration=(3+Math.random()*3)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),6000);
  }
}

// ================== GALAXIA 3D CON FOTOS POLAROID ==================
function iniciarGalaxia(){
  // --- Control de música (dos botones) ---
  const audio1 = document.getElementById('audio1');
  const audio2 = document.getElementById('audio2');
  const btn1 = document.getElementById('music1Btn');
  const btn2 = document.getElementById('music2Btn');
  
  let currentAudio = null;
  
  function stopAll() {
    audio1.pause();
    audio2.pause();
    audio1.currentTime = 0;
    audio2.currentTime = 0;
  }
  
  btn1.addEventListener('click', () => {
    stopAll();
    audio1.play();
    currentAudio = audio1;
    btn1.classList.add('playing');
    btn2.classList.remove('playing');
  });
  
  btn2.addEventListener('click', () => {
    stopAll();
    audio2.play();
    currentAudio = audio2;
    btn2.classList.add('playing');
    btn1.classList.remove('playing');
  });
  
  // Auto-play primera canción al abrir galaxia (opcional)
  setTimeout(() => {
    audio1.play().catch(e => console.log('Autoplay bloqueado, click en botón'));
    btn1.classList.add('playing');
    currentAudio = audio1;
  }, 200);

  // --- Escena Three.js ---
  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true, alpha: false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(innerWidth,innerHeight);
  const scene=new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  
  const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,5000);
  let targetDist = 700, currentDist = 700, rotX = 0.25, rotY = 0;

  // Luces para que las fotos se vean bien
  const ambientLight = new THREE.AmbientLight(0x404060);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(1, 1, 1);
  scene.add(dirLight);
  const backLight = new THREE.PointLight(0x446688, 0.5);
  backLight.position.set(-200, 100, -200);
  scene.add(backLight);

  // Estrellas
  (function makeStars(count=3000,spread=3000){
    const g=new THREE.BufferGeometry();
    const pos=new Float32Array(count*3);
    const colors = new Float32Array(count*3);
    for(let i=0;i<count;i++){
      const r=spread*(0.3+Math.random()*0.7);
      const th=Math.random()*Math.PI*2;
      const ph=Math.acos(2*Math.random()-1);
      pos[i*3+0]=r*Math.sin(ph)*Math.cos(th);
      pos[i*3+1]=r*Math.cos(ph);
      pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
      const intensity = 0.8 + Math.random()*0.5;
      colors[i*3] = intensity;
      colors[i*3+1] = intensity * 0.9;
      colors[i*3+2] = 1.0;
    }
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    g.setAttribute('color',new THREE.BufferAttribute(colors,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:1.8, vertexColors:true, depthWrite:false, transparent:true})));
  })();

  // Núcleo central
  const coreMat=new THREE.MeshPhongMaterial({color:0x331122,transparent:true,opacity:0.6,shininess:200});
  const core=new THREE.Mesh(new THREE.SphereGeometry(40,64,64),coreMat);
  scene.add(core);

  // Texto central "TE AMO"
  function makeCenterTextTexture(msg){
    const c=document.createElement('canvas');c.width=512;c.height=512;
    const ctx=c.getContext('2d');
    ctx.font='bold 80px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle='#ff3366';
    ctx.shadowColor='#ff99cc';
    ctx.shadowBlur=50;
    ctx.fillText(msg,c.width/2,c.height/2);
    return new THREE.CanvasTexture(c);
  }
  const centerTex=makeCenterTextTexture("TE AMO ❤️");
  const centerMat=new THREE.SpriteMaterial({map:centerTex,transparent:true});
  const centerSprite=new THREE.Sprite(centerMat);
  centerSprite.scale.set(60,60,1);
  scene.add(centerSprite);

  // Brillo
  function makeGlow(size=768,c1='255,160,220',c2='180,60,120'){
    const c=document.createElement('canvas');c.width=c.height=size;
    const g=c.getContext('2d');
    const grad=g.createRadialGradient(size/2,size/2,size*0.05,size/2,size/2,size*0.5);
    grad.addColorStop(0,'rgba('+c1+',0.9)');
    grad.addColorStop(0.5,'rgba('+c2+',0.5)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grad;g.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:makeGlow(),transparent:true,depthWrite:false}));
  glow.scale.set(500,500,1);
  scene.add(glow);

  // Anillos
  function ringTexture(size=768){
    const c=document.createElement('canvas');c.width=c.height=size;
    const g=c.getContext('2d');g.translate(size/2,size/2);
    const r1=size*0.34, r2=size*0.49;
    const grd=g.createRadialGradient(0,0,r1*0.3,0,0,r2);
    grd.addColorStop(0.0,'rgba(255,255,220,1)');
    grd.addColorStop(0.3,'rgba(255,180,100,0.9)');
    grd.addColorStop(0.65,'rgba(200,80,120,0.6)');
    grd.addColorStop(1.0,'rgba(0,0,0,0)');
    g.fillStyle=grd;
    g.beginPath(); g.arc(0,0,r2,0,Math.PI*2); g.arc(0,0,r1,0,Math.PI*2,true); g.closePath(); g.fill();
    return new THREE.CanvasTexture(c);
  }
  const ring1=new THREE.Mesh(new THREE.RingGeometry(60,80,128),new THREE.MeshBasicMaterial({map:ringTexture(),transparent:true,side:THREE.DoubleSide}));
  const ring2=new THREE.Mesh(new THREE.RingGeometry(85,100,128),new THREE.MeshBasicMaterial({map:ringTexture(),transparent:true,side:THREE.DoubleSide,opacity:0.6}));
  ring1.rotation.x=ring2.rotation.x=Math.PI/2;
  scene.add(ring1);scene.add(ring2);

  // Palabras flotantes
  const baseWords = [
  '🎁 Cajita Sorpresa 💖',
  '🐣 Hijito??? 💕',
  '😠 Muymaaal 💗',
  '🍇 Lila 💓',
  '🍷 Vino 💞',
  '🥔 Papitas Lays 💘',
  '1️⃣ ¿Que es lo 💝',
  '2️⃣ que puedo 💟',
  '3️⃣ Hacer? ❤️‍🔥',
  '4️⃣ No puedo estar 💔',
  '5️⃣ Serio contigo ❤️',
  '🙅 Nimaaas 💙',
  '💃 Mover la colita 💜',
  '🕺 Mansiche 🤍',
  '🪩 Baileee 💚',
  '👍 Muy bieen 💛',
  '⭐ Toma⭐ 🧡',
  '👫 Moises nos une ❣️'
];
  const WORDS = [];
  for (let i = 0; i < 3; i++) {
    baseWords.forEach((word) => {
      WORDS.push(i === 0 ? word : word + ' ✨');
    });
  }

  function makeWordTexture(text,color){
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    ctx.font='bold 60px Arial';
    const textWidth=ctx.measureText(text).width+60;
    canvas.width=textWidth;
    canvas.height=120;
    const ctx2=canvas.getContext('2d');
    ctx2.font='bold 60px Arial';
    ctx2.textAlign='center';
    ctx2.textBaseline='middle';
    ctx2.fillStyle='#fff';
    ctx2.shadowColor=color;
    ctx2.shadowBlur=35;
    ctx2.fillText(text,canvas.width/2,canvas.height/2);
    return new THREE.CanvasTexture(canvas);
  }

  const COLORS=['#ff66ff','#66ccff','#ffd36b','#ff9966','#8df59a','#ffa0f8','#c6a7ff','#ff4444','#44ff99','#99ccff'];
  const textGroup=new THREE.Group();
  scene.add(textGroup);

  for(let i=0;i<WORDS.length;i++){
    const tex=makeWordTexture(WORDS[i],COLORS[i%COLORS.length]);
    const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
    const sp=new THREE.Sprite(mat);
    const aspect=tex.image.width/tex.image.height;
    sp.scale.set(40*aspect,40,1);
    const phi=Math.acos(2*Math.random()-1);
    const theta=Math.random()*Math.PI*2;
    const r=220+Math.random()*200;
    sp.position.set(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
    sp.userData={phi,theta,radius:r,speed:0.0008+Math.random()*0.0012};
    textGroup.add(sp);
  }

  // ========== FOTOS POLAROID (transparentes, girando) ==========
  // Lista de archivos de imagen (coloca tus fotos en la carpeta)
  const polaroidImages = [
    'foto1.jpg',   // Cambia por tus nombres
    'foto2.jpg',
    'foto3.jpg',
    'foto4.jpg',
    'foto5.jpg',
    'foto6.jpg',
    'foto7.jpg',
    'foto8.jpg',
    'foto9.jpg',
    'foto10.jpg',
  ];
  
  const polaroidGroup = new THREE.Group();
  scene.add(polaroidGroup);
  
  // Cargar texturas y crear sprites con opacidad
  const loader = new THREE.TextureLoader();
  polaroidImages.forEach((src, index) => {
    loader.load(src, (texture) => {
      // Material con transparencia
      const material = new THREE.SpriteMaterial({ 
        map: texture, 
        transparent: true, 
        opacity: 0.65,
        depthTest: true,
        depthWrite: false,
        blending: THREE.NormalBlending
      });
      const sprite = new THREE.Sprite(material);
      
      // Tamaño (ajusta según necesites)
      const scale = 90;
      sprite.scale.set(scale * 1.2, scale, 1); // formato horizontal
      
      // Posición en órbita (similar a palabras pero un poco más lejos)
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = Math.random() * Math.PI * 2;
      const radius = 320 + Math.random() * 150; // más lejos que las palabras
      
      sprite.position.set(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
      
      sprite.userData = {
        phi, theta, radius,
        speed: 0.0004 + Math.random() * 0.0008, // más lento
        initialScale: scale
      };
      
      polaroidGroup.add(sprite);
    });
  });

  // Controles de cámara
  let dragging=false,lastX=0,lastY=0;
  function onDown(e){dragging=true;const t=e.touches?e.touches[0]:e;lastX=t.clientX;lastY=t.clientY;}
  function onMove(e){if(!dragging)return;const t=e.touches?e.touches[0]:e;const dx=(t.clientX-lastX)/innerWidth;const dy=(t.clientY-lastY)/innerHeight;rotY-=dx*3;rotX=Math.max(-1.2,Math.min(1.2,rotX-dy*2.2));lastX=t.clientX;lastY=t.clientY;}
  function onUp(){dragging=false;}
  addEventListener('mousedown',onDown);addEventListener('mousemove',onMove);addEventListener('mouseup',onUp);
  addEventListener('touchstart',onDown,{passive:true});addEventListener('touchmove',onMove,{passive:true});addEventListener('touchend',onUp,{passive:true});
  
  let pinch = 0;
  addEventListener('touchmove', (e) => {
    if (e.touches && e.touches.length === 2) {
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      if (pinch) {
        targetDist += (pinch - d) * 0.5;
        targetDist = Math.max(60, Math.min(2000, targetDist));
      }
      pinch = d;
    }
  }, { passive: false });
  addEventListener('touchend', () => { pinch = 0; }, { passive: true });

  addEventListener('wheel',(e)=>{
    targetDist += e.deltaY * 0.25;
    targetDist = Math.max(80, Math.min(900, targetDist));
  },{passive:true});

  // Animación
  let t=0;
  function tick(){requestAnimationFrame(tick);t+=0.01;
    ring1.rotation.z+=0.002;ring2.rotation.z-=0.0015;
    glow.scale.set(500*(1+Math.sin(t*0.4)*0.03),500*(1+Math.sin(t*0.4)*0.03),1);
    const s=1.0+0.05*Math.sin(t*3);
    core.scale.set(s,s,s);
    
    // Rotar palabras
    textGroup.children.forEach(sp=>{
      sp.userData.theta+=sp.userData.speed;
      sp.position.x=sp.userData.radius*Math.sin(sp.userData.phi)*Math.cos(sp.userData.theta);
      sp.position.z=sp.userData.radius*Math.sin(sp.userData.phi)*Math.sin(sp.userData.theta);
    });
    
    // Rotar fotos polaroid (siempre mirando a cámara es automático por ser Sprite)
    polaroidGroup.children.forEach(sprite => {
      sprite.userData.theta += sprite.userData.speed;
      sprite.position.x = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.cos(sprite.userData.theta);
      sprite.position.z = sprite.userData.radius * Math.sin(sprite.userData.phi) * Math.sin(sprite.userData.theta);
    });
    
    currentDist+=(targetDist-currentDist)*0.06;
    const cx=Math.cos(rotX),sx=Math.sin(rotX);const cy=Math.cos(rotY),sy=Math.sin(rotY);
    camera.position.set(currentDist*sy*cx,currentDist*sx,currentDist*cy*cx);
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
  }
  tick();
  
  // Ajustar al redimensionar
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}
</script>
</body>
</html>
